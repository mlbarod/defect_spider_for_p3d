<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">P3D MAIN 설비별 이상감지 화면 안내</title>
  <desc id="desc">P3D MAIN 화면에서 SDWT 필터, 대상스탭 목록, eqp별 chart, Wafer List, PM 이력을 확인하는 위치를 정렬된 레이아웃으로 설명합니다.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#6a52d9"/>
    </marker>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .h1{fill:#2f204d;font-size:28px;font-weight:800}
      .h2{fill:#2f204d;font-size:18px;font-weight:800}
      .label{fill:#6f6382;font-size:13px;font-weight:800}
      .body{fill:#6f6382;font-size:14px;font-weight:650}
      .small{fill:#6f6382;font-size:13px;font-weight:700}
    </style>
  </defs>
  <rect width="1600" height="820" rx="34" fill="#fbfaff"/>
  <rect x="70" y="58" width="1460" height="676" rx="24" fill="#ffffff" stroke="#ded7ef"/>

  <rect x="110" y="98" width="1380" height="88" rx="16" fill="#f7f3ff" stroke="#ded7ef"/>
  <text class="h1" x="150" y="148">P3D MAIN 설비별 이상감지</text>
  <rect x="1124" y="124" width="120" height="34" rx="17" fill="#e8f5f2"/>
  <text x="1184" y="146" text-anchor="middle" fill="#147b68" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">SDWT ALL</text>
  <rect x="1264" y="124" width="170" height="34" rx="17" fill="#efeafd"/>
  <text x="1349" y="146" text-anchor="middle" fill="#6045cf" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">실제 파일 기반</text>

  <rect x="110" y="226" width="360" height="448" rx="18" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="label" x="150" y="270">1. SDWT와 대상스탭</text>
  <rect x="150" y="300" width="280" height="58" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="335" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="14" font-weight="800">▾ STEP A</text>
  <rect x="178" y="374" width="224" height="38" rx="10" fill="#765ee6"/>
  <text x="290" y="399" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">MET 010203 / ITEM</text>
  <rect x="150" y="432" width="280" height="58" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="467" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="14" font-weight="700">▸ STEP B</text>
  <rect x="150" y="508" width="280" height="58" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="543" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="14" font-weight="700">▸ STEP C</text>
  <text class="body" x="150" y="626">main_step을 펼치고</text>
  <text class="body" x="150" y="654">MET 스탭을 선택합니다.</text>

  <rect x="510" y="226" width="980" height="448" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text class="label" x="550" y="270">2. 선택 MET 스탭의 eqp별 chart</text>
  <rect x="550" y="300" width="840" height="188" rx="14" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="h2" x="586" y="338">EQP-01 / 중심치 이상 / 산포이상</text>
  <line x1="600" y1="444" x2="1110" y2="444" stroke="#b9b0c9" stroke-width="2"/>
  <line x1="600" y1="362" x2="600" y2="444" stroke="#b9b0c9" stroke-width="2"/>
  <circle cx="668" cy="414" r="4" fill="#8d7adf" opacity="0.45"/>
  <circle cx="746" cy="394" r="4" fill="#2d8bc7" opacity="0.45"/>
  <circle cx="824" cy="426" r="4" fill="#8d7adf" opacity="0.45"/>
  <circle cx="932" cy="382" r="8" fill="#db2f2f" stroke="#ffffff" stroke-width="3"/>
  <circle cx="1052" cy="406" r="8" fill="#263a72" stroke="#ffffff" stroke-width="3"/>
  <rect x="1140" y="356" width="200" height="92" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text class="small" x="1170" y="384">Legend</text>
  <circle cx="1174" cy="410" r="5" fill="#db2f2f"/>
  <text class="small" x="1192" y="415" fill="#2f204d">선택 설비</text>
  <circle cx="1174" cy="432" r="5" fill="#9aa0aa"/>
  <text class="small" x="1192" y="437">비교군</text>

  <rect x="550" y="520" width="400" height="70" rx="14" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="586" y="564">이상감지 Wafer List 보기</text>
  <rect x="990" y="520" width="400" height="70" rx="14" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="1026" y="564">PM 이력 보기</text>

  <path d="M402 393h118" stroke="#6a52d9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <rect x="160" y="742" width="1280" height="46" rx="14" fill="#ffffff" stroke="#ded7ef"/>
  <text class="body" x="800" y="772" text-anchor="middle">좌측에서 스탭을 고르면 우측에 설비별 chart, Wafer List, PM 이력이 같은 카드 안에 표시됩니다.</text>
</svg>
