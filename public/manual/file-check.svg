<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="740" viewBox="0 0 1600 740" role="img" aria-labelledby="title desc">
  <title id="title">문제 발생 시 파일 상태 확인 위치</title>
  <desc id="desc">좌측 목록이 비거나 chart가 read failed일 때 File Loader 배너, Data Source 경로, chart 실패 카드의 경로 후보를 확인하는 순서를 정렬된 카드로 설명합니다.</desc>
  <defs>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .h1{fill:#2f204d;font-size:30.8px;font-weight:800}
      .h2{fill:#2f204d;font-size:19.8px;font-weight:800}
      .label{fill:#6f6382;font-size:14.3px;font-weight:800}
      .body{fill:#6f6382;font-size:15.4px;font-weight:650}
      .warn{fill:#c82727;font-size:15.4px;font-weight:800}
    </style>
  </defs>
  <rect width="1600" height="740" rx="34" fill="#fbfaff"/>
  <text class="h1" x="80" y="88">데이터가 비어 있을 때 확인 순서</text>
  <text class="body" x="80" y="126">원본 파일 상태와 chart 경로를 먼저 확인하면 대부분의 원인을 좁힐 수 있습니다.</text>

  <rect x="100" y="184" width="1400" height="110" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text class="label" x="150" y="230">FILE LOADER</text>
  <text class="h2" x="150" y="262">latestDate 데이터 기준 이상감지 / 입력 행 / 표시 건 / 경고</text>
  <rect x="1240" y="224" width="210" height="36" rx="18" fill="#feecec"/>
  <text class="warn" x="1345" y="247" text-anchor="middle">미확인 파일 2개</text>

  <rect x="100" y="350" width="660" height="220" rx="22" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="150" y="404">좌측 목록이 비어 있음</text>
  <text class="body" x="150" y="448">입력 행이 0인지, 필수 컬럼이 누락됐는지,</text>
  <text class="body" x="150" y="478">원본 파일이 readable인지 확인합니다.</text>
  <rect x="150" y="510" width="430" height="38" rx="10" fill="#faf9ff" stroke="#ded7ef"/>
  <text x="174" y="535" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="14.3" font-weight="700">Data Source: missing / not readable</text>

  <rect x="840" y="350" width="660" height="220" rx="22" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="890" y="404">chart가 read failed</text>
  <text class="body" x="890" y="448">실패 카드에 표시되는 all / fail / std 경로와</text>
  <text class="body" x="890" y="478">실제 latestDate 디렉터리, parquet 파일명을 비교합니다.</text>
  <rect x="890" y="510" width="470" height="38" rx="10" fill="#feecec" stroke="#f2c6c6"/>
  <text class="warn" x="914" y="535">read failed: all/fail/std path 후보 확인</text>

  <rect x="180" y="632" width="1240" height="54" rx="16" fill="#ffffff" stroke="#ded7ef"/>
  <text class="body" x="800" y="666" text-anchor="middle">경로와 컬럼 규칙이 바뀌면 README의 Data Sources와 Chart Data 표도 함께 갱신해야 합니다.</text>
</svg>
