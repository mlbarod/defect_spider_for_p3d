<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">P3D FCC지수 이상감지 화면 안내</title>
  <desc id="desc">FCC 화면에서 FCC 중심치 chart, 연관 Step chart, FCC 이상시점 chart, 관리 STEP chart 버튼이 같은 설비 stack으로 연결되는 구조를 정렬된 레이아웃으로 설명합니다.</desc>
  <defs>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .h1{fill:#2f204d;font-size:34px;font-weight:800}
      .h2{fill:#2f204d;font-size:24px;font-weight:800}
      .label{fill:#6f6382;font-size:15px;font-weight:800}
      .body{fill:#6f6382;font-size:17px;font-weight:650}
      .tag{font-size:16px;font-weight:800}
    </style>
  </defs>
  <rect width="1600" height="820" rx="34" fill="#fbfaff"/>
  <rect x="70" y="58" width="1460" height="676" rx="24" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h1" x="110" y="112">P3D FCC지수 이상감지</text>
  <text class="body" x="110" y="148">FCC 중심치 이상을 기준으로 연관 Step과 이상시점 chart를 같은 설비 단위로 비교합니다.</text>

  <rect x="110" y="206" width="360" height="468" rx="18" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="label" x="150" y="250">1. FCC지수 연관 이상감지</text>
  <rect x="150" y="284" width="280" height="62" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="322" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="17" font-weight="800">▾ FCC MAIN STEP</text>
  <rect x="178" y="364" width="224" height="40" rx="10" fill="#765ee6"/>
  <text x="290" y="390" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="15" font-weight="800">FCC MET 선택</text>
  <rect x="150" y="430" width="280" height="62" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="468" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="17" font-weight="700">▸ single 항목</text>
  <text class="body" x="150" y="580">main_step을 펼친 뒤</text>
  <text class="body" x="150" y="608">FCC 중심치 met_step을</text>
  <text class="body" x="150" y="636">선택합니다.</text>

  <rect x="510" y="206" width="980" height="468" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text class="label" x="550" y="250">2. 설비별 FCC 연관 chart stack</text>
  <text class="h2" x="550" y="286">EQP-01</text>
  <rect x="550" y="318" width="880" height="84" rx="14" fill="#efeafd" stroke="#ded7ef"/>
  <text class="tag" x="586" y="350" fill="#6045cf">FCC 중심치 이상</text>
  <line x1="586" y1="378" x2="870" y2="378" stroke="#b9b0c9" stroke-width="2"/>
  <circle cx="700" cy="360" r="8" fill="#db2f2f"/>
  <circle cx="780" cy="372" r="4" fill="#8d7adf" opacity="0.48"/>
  <rect x="1176" y="342" width="210" height="34" rx="10" fill="#ffffff" stroke="#c9bee8"/>
  <text x="1281" y="364" text-anchor="middle" fill="#6045cf" font-family="Pretendard,Inter,Arial,sans-serif" font-size="15" font-weight="800">관리STEP CHART 보기</text>

  <rect x="550" y="424" width="880" height="84" rx="14" fill="#e8f5f2" stroke="#cde5df"/>
  <text class="tag" x="586" y="456" fill="#147b68">연관 Step 이상감지</text>
  <line x1="586" y1="484" x2="870" y2="484" stroke="#b9b0c9" stroke-width="2"/>
  <circle cx="748" cy="466" r="8" fill="#db2f2f"/>

  <rect x="550" y="530" width="880" height="84" rx="14" fill="#fff0e5" stroke="#f2d5bf"/>
  <text class="tag" x="586" y="562" fill="#b95d1f">FCC 이상시점 연관 Step 이상감지</text>
  <line x1="586" y1="590" x2="870" y2="590" stroke="#b9b0c9" stroke-width="2"/>
  <rect x="714" y="566" width="70" height="38" rx="6" fill="#db2f2f" opacity="0.16"/>
  <circle cx="750" cy="584" r="8" fill="#db2f2f"/>

  <line x1="990" y1="402" x2="990" y2="424" stroke="#6a52d9" stroke-width="4"/>
  <line x1="990" y1="508" x2="990" y2="530" stroke="#6a52d9" stroke-width="4"/>
  <rect x="160" y="742" width="1280" height="46" rx="14" fill="#ffffff" stroke="#ded7ef"/>
  <text class="body" x="800" y="772" text-anchor="middle">같은 eqp_id 기준으로 위에서 아래로 읽으면 FCC 지수 이상과 연관 Step 이상을 한 번에 비교할 수 있습니다.</text>
</svg>
