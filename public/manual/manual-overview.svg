<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Defect SPIDER 전체 사용 흐름</title>
  <desc id="desc">App 선택, 조건 선택, chart 확인, 원인 추적 순서로 Defect SPIDER를 사용하는 흐름을 정렬된 4개 카드로 나타낸 안내 이미지</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-14%" width="116%" height="132%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#31214d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#6a52d9"/>
    </marker>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .title{fill:#2f204d;font-size:40px;font-weight:800}
      .subtitle{fill:#6f6382;font-size:20px;font-weight:650}
      .cardTitle{fill:#2f204d;font-size:26px;font-weight:800}
      .cardText{fill:#6f6382;font-size:17px;font-weight:650}
      .small{fill:#6f6382;font-size:16px;font-weight:650}
    </style>
  </defs>
  <rect width="1600" height="760" rx="34" fill="#fbfaff"/>
  <text class="title" x="80" y="88">Defect SPIDER는 4단계로 사용합니다</text>
  <text class="subtitle" x="80" y="126">처음 보는 사용자는 왼쪽에서 오른쪽 순서로 App을 열고, 조건을 고른 뒤 chart와 상세 표를 확인하면 됩니다.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="200" width="300" height="300" rx="22" fill="#ffffff" stroke="#ded7ef"/>
    <rect x="460" y="200" width="300" height="300" rx="22" fill="#ffffff" stroke="#ded7ef"/>
    <rect x="840" y="200" width="300" height="300" rx="22" fill="#ffffff" stroke="#ded7ef"/>
    <rect x="1220" y="200" width="300" height="300" rx="22" fill="#ffffff" stroke="#ded7ef"/>
  </g>

  <g transform="translate(80 200)">
    <circle cx="150" cy="82" r="48" fill="#efeafd"/>
    <rect x="114" y="58" width="72" height="50" rx="12" fill="#765ee6"/>
    <rect x="128" y="72" width="44" height="7" rx="3.5" fill="#ffffff" opacity="0.86"/>
    <rect x="128" y="88" width="32" height="7" rx="3.5" fill="#ffffff" opacity="0.72"/>
    <text class="cardTitle" x="150" y="176" text-anchor="middle">1. App 선택</text>
    <text class="cardText" x="150" y="216" text-anchor="middle">Main / FCC / Chamber</text>
    <text class="cardText" x="150" y="244" text-anchor="middle">L0 / L1 메뉴 진입</text>
  </g>

  <g transform="translate(460 200)">
    <circle cx="150" cy="82" r="48" fill="#e8f5f2"/>
    <rect x="104" y="52" width="92" height="14" rx="7" fill="#1f9a82"/>
    <rect x="104" y="78" width="92" height="14" rx="7" fill="#cadbd8"/>
    <rect x="104" y="104" width="68" height="14" rx="7" fill="#cadbd8"/>
    <text class="cardTitle" x="150" y="176" text-anchor="middle">2. 조건 선택</text>
    <text class="cardText" x="150" y="216" text-anchor="middle">SDWT / Line / Device</text>
    <text class="cardText" x="150" y="244" text-anchor="middle">main_step / met_step</text>
  </g>

  <g transform="translate(840 200)">
    <circle cx="150" cy="82" r="48" fill="#fff0e5"/>
    <polyline points="104,98 126,78 150,88 176,56 204,70" fill="none" stroke="#e86f2f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="176" cy="56" r="7" fill="#db2f2f"/>
    <circle cx="204" cy="70" r="6" fill="#1f9a82"/>
    <text class="cardTitle" x="150" y="176" text-anchor="middle">3. Chart 확인</text>
    <text class="cardText" x="150" y="216" text-anchor="middle">scatter / legend / tooltip</text>
    <text class="cardText" x="150" y="244" text-anchor="middle">Wafer List / PM 이력</text>
  </g>

  <g transform="translate(1220 200)">
    <circle cx="150" cy="82" r="48" fill="#feecec"/>
    <path d="M132 82h36M150 64v36" stroke="#d92d2d" stroke-width="8" stroke-linecap="round"/>
    <text class="cardTitle" x="150" y="176" text-anchor="middle">4. 원인 추적</text>
    <text class="cardText" x="150" y="216" text-anchor="middle">Defect MAP</text>
    <text class="cardText" x="150" y="244" text-anchor="middle">관리 STEP / 외부 Trend</text>
  </g>

  <path d="M404 350h32" stroke="#6a52d9" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M784 350h32" stroke="#6a52d9" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1164 350h32" stroke="#6a52d9" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="160" y="580" width="1280" height="92" rx="20" fill="#ffffff" stroke="#ded7ef"/>
  <text x="200" y="620" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="22" font-weight="800">핵심 원칙</text>
  <text class="small" x="200" y="652">빨간 point를 기준으로 lot / wafer / 시간 / 설비를 맞추고, Wafer List와 PM 이력으로 원인을 좁혀갑니다.</text>
</svg>
