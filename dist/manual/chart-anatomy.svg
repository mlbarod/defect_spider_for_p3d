  <rect x="1180" y="122" width="128" height="34" rx="17" fill="#feecec"/>
  <text x="1244" y="144" text-anchor="middle" fill="#c82727" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">중심치 이상</text>
  <rect x="1324" y="122" width="116" height="34" rx="17" fill="#eceffd"/>
  <text x="1382" y="144" text-anchor="middle" fill="#263a72" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">산포이상</text>

  <rect x="110" y="216" width="1040" height="330" rx="16" fill="#faf9ff" stroke="#ded7ef"/>
  <line x1="190" y1="484" x2="1086" y2="484" stroke="#b9b0c9" stroke-width="2"/>
  <line x1="190" y1="274" x2="190" y2="484" stroke="#b9b0c9" stroke-width="2"/>
  <text class="body" x="198" y="520">tkout_time</text>
  <text class="body" x="136" y="292">fab_value</text>
  <circle cx="300" cy="430" r="4" fill="#8d7adf" opacity="0.45"/>
  <circle cx="392" cy="392" r="4" fill="#2d8bc7" opacity="0.45"/>
  <circle cx="492" cy="446" r="4" fill="#8d7adf" opacity="0.45"/>
  <circle cx="628" cy="356" r="4" fill="#1f9a82" opacity="0.45"/>
  <circle cx="760" cy="404" r="4" fill="#d89a25" opacity="0.45"/>
  <circle cx="900" cy="332" r="10" fill="#db2f2f" stroke="#ffffff" stroke-width="3"/>
  <circle cx="1024" cy="408" r="10" fill="#263a72" stroke="#ffffff" stroke-width="3"/>
  <line x1="822" y1="274" x2="822" y2="484" stroke="#1f9a82" stroke-width="3" stroke-dasharray="7 7"/>
  <text x="834" y="300" fill="#147b68" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">PM</text>

  <rect x="1190" y="216" width="260" height="330" rx="16" fill="#ffffff" stroke="#ded7ef"/>
  <text class="label" x="1230" y="258">STEP</text>
  <circle cx="1232" cy="292" r="6" fill="#765ee6"/>
  <text class="body" x="1254" y="298" fill="#2f204d">10</text>
  <circle cx="1232" cy="326" r="6" fill="#2d8bc7"/>
  <text class="body" x="1254" y="332" fill="#2f204d">12</text>
  <text class="label" x="1230" y="390">EQP</text>
  <circle cx="1232" cy="424" r="6" fill="#db2f2f"/>
