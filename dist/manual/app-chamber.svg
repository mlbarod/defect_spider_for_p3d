<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">전라인 챔버별 이상감지 화면 안내</title>
  <desc id="desc">전라인 챔버별 이상감지 화면에서 라인, 제품, 대상스탭, 챔버별 chart를 선택하는 순서를 정렬된 레이아웃으로 설명합니다.</desc>
  <defs>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .h1{fill:#2f204d;font-size:28px;font-weight:800}
      .h2{fill:#2f204d;font-size:18px;font-weight:800}
      .label{fill:#6f6382;font-size:13px;font-weight:800}
      .body{fill:#6f6382;font-size:14px;font-weight:650}
    </style>
  </defs>
  <rect width="1600" height="820" rx="34" fill="#fbfaff"/>
  <rect x="70" y="58" width="1460" height="676" rx="24" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h1" x="110" y="112">전라인 챔버별 이상감지</text>
  <text class="body" x="110" y="148">line_mapping.txt 기준으로 라인과 device를 고른 뒤 개별 챔버 chart를 확인합니다.</text>

  <rect x="110" y="196" width="1380" height="150" rx="18" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="label" x="150" y="240">1. 라인 선택</text>
  <rect x="150" y="266" width="170" height="44" rx="11" fill="#765ee6"/>
  <text x="235" y="294" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">P3D / PFB3</text>
  <rect x="340" y="266" width="170" height="44" rx="11" fill="#ffffff" stroke="#ded7ef"/>
  <text x="425" y="294" text-anchor="middle" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="700">LINE B</text>
  <text class="label" x="620" y="240">2. 제품 선택</text>
  <rect x="620" y="266" width="170" height="44" rx="11" fill="#1f9a82"/>
  <text x="705" y="294" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">D1c</text>
  <rect x="810" y="266" width="170" height="44" rx="11" fill="#ffffff" stroke="#ded7ef"/>
  <text x="895" y="294" text-anchor="middle" fill="#6f6382" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="700">Device B</text>

  <rect x="110" y="386" width="360" height="288" rx="18" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="label" x="150" y="430">3. 대상스탭 선택</text>
  <rect x="150" y="462" width="280" height="60" rx="12" fill="#ffffff" stroke="#ded7ef"/>
  <text x="176" y="500" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="14" font-weight="800">▾ MAIN STEP</text>
  <rect x="178" y="542" width="224" height="40" rx="10" fill="#765ee6"/>
  <text x="290" y="568" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">MET STEP</text>

  <rect x="510" y="386" width="980" height="288" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text class="label" x="550" y="430">4. Chamber Equipment Charts</text>
  <rect x="550" y="462" width="410" height="142" rx="14" fill="#faf9ff" stroke="#ded7ef"/>
  <text x="586" y="500" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">CH-01 중심치 이상</text>
  <line x1="586" y1="568" x2="888" y2="568" stroke="#b9b0c9" stroke-width="2"/>
  <circle cx="708" cy="532" r="8" fill="#db2f2f"/>
  <circle cx="806" cy="552" r="4" fill="#8d7adf" opacity="0.45"/>
  <rect x="1020" y="462" width="410" height="142" rx="14" fill="#faf9ff" stroke="#ded7ef"/>
  <text x="1056" y="500" fill="#2f204d" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">CH-02 산포이상</text>
  <line x1="1056" y1="568" x2="1358" y2="568" stroke="#b9b0c9" stroke-width="2"/>
  <circle cx="1138" cy="550" r="8" fill="#263a72"/>
  <circle cx="1268" cy="532" r="4" fill="#1f9a82" opacity="0.55"/>

  <rect x="160" y="742" width="1280" height="46" rx="14" fill="#ffffff" stroke="#ded7ef"/>
  <text class="body" x="800" y="772" text-anchor="middle">라인 목록이 없으면 line_mapping.txt의 line, line_code, device 헤더와 파일 readable 상태를 먼저 확인합니다.</text>
</svg>
