<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Defect SPIDER 전체 사용 흐름</title>
  <desc id="desc">App 선택, 조건 선택, chart 확인, 원인 추적 순서로 Defect SPIDER를 사용하는 흐름을 나타낸 안내 이미지</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#31214d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#6a52d9"/>
    </marker>
  </defs>
  <rect width="1040" height="560" rx="28" fill="#fbfaff"/>
  <text x="56" y="68" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="30" font-weight="800">Defect SPIDER는 4단계로 사용합니다</text>
  <text x="56" y="102" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="16" font-weight="600">처음 접하는 사용자는 왼쪽에서 오른쪽 순서로 화면을 확인하면 됩니다.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="154" width="194" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <circle cx="155" cy="214" r="42" fill="#efeafd"/>
    <rect x="123" y="197" width="64" height="44" rx="10" fill="#765ee6"/>
    <rect x="133" y="207" width="44" height="6" rx="3" fill="#ffffff" opacity="0.86"/>
    <rect x="133" y="221" width="31" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    <text x="155" y="290" text-anchor="middle" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="20" font-weight="800">1. App 선택</text>
    <text x="155" y="324" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">Main / FCC / Chamber</text>
    <text x="155" y="348" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">L0 / L1 메뉴로 진입</text>
  </g>

  <path d="M272 270h76" stroke="#6a52d9" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="370" y="154" width="194" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <circle cx="467" cy="214" r="42" fill="#e8f5f2"/>
    <rect x="426" y="190" width="82" height="12" rx="6" fill="#1f9a82"/>
    <rect x="426" y="211" width="82" height="12" rx="6" fill="#cadbd8"/>
    <rect x="426" y="232" width="58" height="12" rx="6" fill="#cadbd8"/>
    <text x="467" y="290" text-anchor="middle" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="20" font-weight="800">2. 조건 선택</text>
    <text x="467" y="324" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">SDWT, Line, Device</text>
    <text x="467" y="348" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">main_step과 met_step 선택</text>
  </g>

  <path d="M584 270h76" stroke="#6a52d9" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="682" y="154" width="194" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <circle cx="779" cy="214" r="42" fill="#fff0e5"/>
    <polyline points="735,232 755,218 774,224 796,197 823,207" fill="none" stroke="#e86f2f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="796" cy="197" r="6" fill="#db2f2f"/>
    <circle cx="823" cy="207" r="5" fill="#1f9a82"/>
    <text x="779" y="290" text-anchor="middle" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="20" font-weight="800">3. Chart 확인</text>
    <text x="779" y="324" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">scatter, legend, tooltip</text>
    <text x="779" y="348" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">Wafer List와 PM 이력 확인</text>
  </g>

  <path d="M884 270h38" stroke="#6a52d9" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="928" y="154" width="54" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  </g>
  <g filter="url(#shadow)" transform="translate(850 0)">
    <rect x="78" y="154" width="96" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <circle cx="126" cy="214" r="34" fill="#feecec"/>
    <path d="M111 215h30M126 200v30" stroke="#d92d2d" stroke-width="6" stroke-linecap="round"/>
    <text x="126" y="290" text-anchor="middle" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="17" font-weight="800">4. 추적</text>
    <text x="126" y="323" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="650">Defect MAP</text>
    <text x="126" y="345" text-anchor="middle" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="650">관리 STEP</text>
  </g>

  <rect x="96" y="430" width="848" height="70" rx="16" fill="#ffffff" stroke="#ded7ef"/>
  <text x="128" y="461" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="16" font-weight="800">핵심 원칙</text>
  <text x="128" y="488" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">빨간 point를 기준으로 lot / wafer / 시간 / 설비를 맞추고, Wafer List와 PM 이력으로 원인을 좁혀갑니다.</text>
</svg>
