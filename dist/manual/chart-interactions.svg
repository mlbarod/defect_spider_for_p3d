<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" role="img" aria-labelledby="title desc">
  <title id="title">Defect SPIDER chart 조작법</title>
  <desc id="desc">점 hover tooltip, 우하향 드래그 확대, 좌상향 드래그 축소, 더블클릭 초기화, legend 클릭 표시 전환 방법을 안내합니다.</desc>
  <defs>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#6a52d9"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#db2f2f"/>
    </marker>
  </defs>
  <rect width="1040" height="700" rx="28" fill="#fbfaff"/>
  <text x="56" y="66" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="30" font-weight="800">Chart 조작법</text>
  <text x="56" y="100" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="16" font-weight="650">마우스 hover, 드래그 방향, 더블클릭, legend 클릭으로 chart를 탐색합니다.</text>

  <g transform="translate(56 140)">
    <rect width="438" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <text x="26" y="38" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">1. 점 위에 마우스 올리기</text>
    <rect x="28" y="62" width="244" height="126" rx="10" fill="#faf9ff" stroke="#ded7ef"/>
    <line x1="60" y1="160" x2="244" y2="160" stroke="#b9b0c9"/>
    <line x1="60" y1="82" x2="60" y2="160" stroke="#b9b0c9"/>
    <circle cx="140" cy="116" r="7" fill="#db2f2f"/>
    <path d="M160 118h50" stroke="#6a52d9" stroke-width="3" marker-end="url(#arrowPurple)"/>
    <rect x="218" y="84" width="176" height="84" rx="10" fill="#ffffff" stroke="#ded7ef"/>
    <text x="236" y="110" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="800">tooltip</text>
    <text x="236" y="132" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="11" font-weight="650">lot_wf / tkout_time</text>
    <text x="236" y="151" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="11" font-weight="650">eqp_ch / fab_value</text>
    <text x="28" y="210" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">point 상세값을 빠르게 확인합니다.</text>
  </g>

  <g transform="translate(546 140)">
    <rect width="438" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <text x="26" y="38" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">2. 우하향 드래그 = 확대</text>
    <rect x="28" y="62" width="244" height="126" rx="10" fill="#faf9ff" stroke="#ded7ef"/>
    <line x1="60" y1="160" x2="244" y2="160" stroke="#b9b0c9"/>
    <line x1="60" y1="82" x2="60" y2="160" stroke="#b9b0c9"/>
    <rect x="104" y="92" width="92" height="54" rx="4" fill="#765ee6" opacity="0.14" stroke="#765ee6" stroke-width="2" stroke-dasharray="6 4"/>
    <path d="M102 90l94 58" stroke="#6a52d9" stroke-width="4" marker-end="url(#arrowPurple)" stroke-linecap="round"/>
    <circle cx="134" cy="126" r="5" fill="#db2f2f"/>
    <circle cx="176" cy="112" r="4" fill="#2d8bc7"/>
    <text x="296" y="100" fill="#6045cf" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="800">선택 영역만</text>
    <text x="296" y="123" fill="#6045cf" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="800">확대 표시</text>
    <text x="28" y="210" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">관심 구간을 왼쪽 위에서 오른쪽 아래로 끌어 선택합니다.</text>
  </g>

  <g transform="translate(56 410)">
    <rect width="438" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <text x="26" y="38" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">3. 좌상향 드래그 = 축소</text>
    <rect x="28" y="62" width="244" height="126" rx="10" fill="#faf9ff" stroke="#ded7ef"/>
    <line x1="60" y1="160" x2="244" y2="160" stroke="#b9b0c9"/>
    <line x1="60" y1="82" x2="60" y2="160" stroke="#b9b0c9"/>
    <rect x="106" y="94" width="90" height="52" rx="4" fill="#db2f2f" opacity="0.12" stroke="#db2f2f" stroke-width="2" stroke-dasharray="6 4"/>
    <path d="M198 148l-94-58" stroke="#db2f2f" stroke-width="4" marker-end="url(#arrowRed)" stroke-linecap="round"/>
    <text x="296" y="100" fill="#c82727" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="800">현재 view에서</text>
    <text x="296" y="123" fill="#c82727" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="800">더 넓게 보기</text>
    <text x="28" y="210" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">오른쪽 아래에서 왼쪽 위로 끌면 범위가 넓어집니다.</text>
  </g>

  <g transform="translate(546 410)">
    <rect width="438" height="230" rx="18" fill="#ffffff" stroke="#ded7ef"/>
    <text x="26" y="38" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">4. 초기화와 Legend</text>
    <rect x="28" y="62" width="210" height="126" rx="10" fill="#faf9ff" stroke="#ded7ef"/>
    <text x="70" y="118" fill="#6045cf" font-family="Pretendard, Inter, Arial, sans-serif" font-size="22" font-weight="900">Double Click</text>
    <text x="78" y="146" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="700">확대/축소 초기화</text>
    <rect x="264" y="62" width="132" height="126" rx="10" fill="#ffffff" stroke="#ded7ef"/>
    <text x="286" y="92" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="11" font-weight="800">Legend</text>
    <circle cx="288" cy="116" r="5" fill="#db2f2f"/>
    <text x="304" y="120" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="11" font-weight="700">EQP-01</text>
    <circle cx="288" cy="142" r="5" fill="#9aa0aa" opacity="0.38"/>
    <text x="304" y="146" fill="#9aa0aa" font-family="Pretendard, Inter, Arial, sans-serif" font-size="11" font-weight="700">비교군 숨김</text>
    <text x="28" y="210" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">Legend 항목을 클릭하면 해당 STEP/EQP point 표시가 전환됩니다.</text>
  </g>
</svg>
