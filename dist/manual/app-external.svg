<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">L0, L1 이상감지 App 연결 안내</title>
  <desc id="desc">Defect SPIDER 홈에서 L0 또는 L1 SPIDER를 새 탭으로 열고 Defect chart와 교차 확인하는 흐름을 동일한 폭의 카드로 설명합니다.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#6a52d9"/>
    </marker>
    <style>
      text{font-family:Pretendard,Inter,Arial,sans-serif}
      .h1{fill:#2f204d;font-size:28px;font-weight:800}
      .h2{fill:#2f204d;font-size:18px;font-weight:800}
      .body{fill:#6f6382;font-size:14px;font-weight:650}
      .small{fill:#6f6382;font-size:13px;font-weight:700}
    </style>
  </defs>
  <rect width="1600" height="700" rx="34" fill="#fbfaff"/>
  <text class="h1" x="80" y="88">L0 / L1 SPIDER 연계 확인</text>
  <text class="body" x="80" y="126">외부 Trend 화면과 Defect SPIDER의 wafer, time, eqp 정보를 맞춰 봅니다.</text>

  <rect x="160" y="190" width="520" height="330" rx="22" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="210" y="248">Defect SPIDER 홈</text>
  <rect x="210" y="292" width="270" height="64" rx="14" fill="#765ee6"/>
  <text x="345" y="332" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">L0 SPIDER</text>
  <rect x="210" y="382" width="270" height="64" rx="14" fill="#1f9a82"/>
  <text x="345" y="422" text-anchor="middle" fill="#ffffff" font-family="Pretendard,Inter,Arial,sans-serif" font-size="13" font-weight="800">L1 SPIDER</text>
  <text class="small" x="210" y="486">홈 화면에서 외부 App 버튼을 선택합니다.</text>

  <path d="M720 355h160" stroke="#6a52d9" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="920" y="190" width="520" height="330" rx="22" fill="#ffffff" stroke="#ded7ef"/>
  <text class="h2" x="970" y="248">외부 Trend 화면</text>
  <rect x="970" y="286" width="380" height="50" rx="12" fill="#faf9ff" stroke="#ded7ef"/>
  <text class="small" x="994" y="318">Line / EQP / 기간 조건 선택</text>
  <polyline points="990,430 1048,392 1108,410 1180,342 1260,380 1350,314" fill="none" stroke="#1f9a82" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1180" cy="342" r="9" fill="#db2f2f"/>
  <text class="small" x="970" y="486">Trend 이상 시점과 Defect chart의 tkout_time을 맞춥니다.</text>

  <rect x="240" y="590" width="1120" height="54" rx="16" fill="#ffffff" stroke="#ded7ef"/>
  <text class="body" x="800" y="624" text-anchor="middle">팝업 차단 또는 사내 링크 권한 문제로 새 탭이 열리지 않을 수 있습니다.</text>
</svg>
