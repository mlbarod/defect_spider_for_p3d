<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">문제 발생 시 파일 상태 확인 위치</title>
  <desc id="desc">좌측 목록이 비거나 chart가 read failed일 때 File Loader 배너, Data Source 경로, chart 실패 카드의 경로 후보를 확인하는 순서를 설명합니다.</desc>
  <rect width="1040" height="520" rx="28" fill="#fbfaff"/>
  <text x="64" y="72" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="28" font-weight="800">데이터가 비어 있을 때 확인 순서</text>
  <text x="64" y="104" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="15" font-weight="650">원본 파일 상태와 chart 경로를 먼저 확인하면 대부분의 원인을 좁힐 수 있습니다.</text>

  <rect x="74" y="148" width="892" height="76" rx="16" fill="#ffffff" stroke="#ded7ef"/>
  <text x="106" y="182" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="800">FILE LOADER</text>
  <text x="106" y="205" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">latestDate 데이터 기준 이상감지 / 입력 행 / 표시 건 / 경고</text>
  <rect x="760" y="172" width="158" height="28" rx="14" fill="#feecec"/>
  <text x="839" y="191" text-anchor="middle" fill="#c82727" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="800">미확인 파일 2개</text>

  <rect x="74" y="258" width="410" height="164" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text x="106" y="296" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">좌측 목록이 비어 있음</text>
  <text x="106" y="326" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">입력 행이 0인지, 필수 컬럼이 누락됐는지,</text>
  <text x="106" y="348" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">원본 파일이 readable인지 확인합니다.</text>
  <rect x="106" y="370" width="300" height="30" rx="8" fill="#faf9ff" stroke="#ded7ef"/>
  <text x="124" y="390" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="700">Data Source: missing / not readable</text>

  <rect x="526" y="258" width="440" height="164" rx="18" fill="#ffffff" stroke="#ded7ef"/>
  <text x="558" y="296" fill="#2f204d" font-family="Pretendard, Inter, Arial, sans-serif" font-size="18" font-weight="800">chart가 read failed</text>
  <text x="558" y="326" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">실패 카드에 표시되는 all / fail / std 경로와</text>
  <text x="558" y="348" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="13" font-weight="650">실제 latestDate 디렉터리, parquet 파일명을 비교합니다.</text>
  <rect x="558" y="370" width="330" height="30" rx="8" fill="#feecec" stroke="#f2c6c6"/>
  <text x="576" y="390" fill="#c82727" font-family="Pretendard, Inter, Arial, sans-serif" font-size="12" font-weight="700">read failed: all/fail/std path 후보 확인</text>

  <text x="74" y="466" fill="#6f6382" font-family="Pretendard, Inter, Arial, sans-serif" font-size="14" font-weight="650">경로와 컬럼 규칙이 바뀌면 README의 Data Sources와 Chart Data 표도 함께 갱신해야 합니다.</text>
</svg>
